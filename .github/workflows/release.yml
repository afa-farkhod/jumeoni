name: Build, Deploy & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci || npm install

      - name: Compute base path for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "BASE_PATH=/${REPO_NAME}/" >> $GITHUB_ENV
          echo "Base path: /${REPO_NAME}/"

      - name: Build
        env:
          BASE_PATH: ${{ env.BASE_PATH }}
        run: npm run build

      - name: Compute metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF##refs/tags/}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Create release archive
        run: |
          cd dist
          zip -r ../jumeoni-${{ steps.meta.outputs.version }}.zip .
          cd ..
          ls -la jumeoni-*.zip

      - name: Upload site artifact (for Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Upload zip artifact (for Release)
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: jumeoni-*.zip
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip

      - name: Generate release notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          {
            echo "## Jumeoni ${VERSION}"
            echo
            echo "**Live demo:** https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
            echo
            echo "### Install / self-host"
            echo
            echo "1. Download \`jumeoni-${VERSION}.zip\` below"
            echo "2. Unzip and serve the contents from any static host (Vercel, Netlify, S3, your own nginx)"
            echo "3. Or just open \`index.html\` in your browser — works locally too"
            echo
            echo "### Bring your own API key"
            echo
            echo "Jumeoni runs entirely client-side. Configure your Gemini API key inside the app — it's stored in localStorage only."
            echo
            echo "For production, see the README for the recommended Cloudflare Worker / Vercel proxy pattern."
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Jumeoni ${{ needs.build.outputs.version }}
          body_path: release-notes.md
          files: jumeoni-*.zip
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
